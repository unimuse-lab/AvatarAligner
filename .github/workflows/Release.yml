name: Build Release Zip

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Zip
        # アセット名を Avatar Aligner 用に変更
        # ルートフォルダを含まず、不要な Git 関連ファイルを除外して zip 化
        run: zip -r com.unimuse.avatar-aligner-${{ github.ref_name }}.zip . -x "*.git*" ".github*" "Assets/UniMuseData*"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: com.unimuse.avatar-aligner-${{ github.ref_name }}.zip